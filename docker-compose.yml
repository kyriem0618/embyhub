version: '3.8'

services:
  embyhub:
    build: .
    container_name: embyhub
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - EMBY_URL=${EMBY_URL}
      - EMBY_API_KEY=${EMBY_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - DB_PATH=/app/data/embyhub.db
    volumes:
      - embyhub_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/emby/test"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  embyhub_data: