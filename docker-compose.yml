version: '3.8'

services:
  embyhub:
    build: .
    container_name: embyhub
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - EMBY_URL=${EMBY_URL}
      - EMBY_API_KEY=${EMBY_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=embyhub
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=embyhub
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - embyhub-network

  mysql:
    image: mysql:8.0
    container_name: embyhub-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=embyhub
      - MYSQL_USER=embyhub
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - embyhub-network

networks:
  embyhub-network:
    driver: bridge

volumes:
  mysql_data: