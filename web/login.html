<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmbyHub - 登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    
    /* Animated gradient background */
    .bg-animated {
      background: linear-gradient(-45deg, #0f172a, #1e1b4b, #172554, #0c4a6e);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
    }
    
    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    /* Floating particles */
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      animation: float 20s infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
    }
    
    /* Glass card */
    .glass {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    /* Input focus effect */
    .input-glow:focus {
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
    }
    
    /* Button shimmer */
    .btn-shimmer {
      position: relative;
      overflow: hidden;
    }
    .btn-shimmer::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        to right,
        transparent 0%,
        rgba(255, 255, 255, 0.1) 50%,
        transparent 100%
      );
      transform: rotate(45deg);
      animation: shimmer 3s infinite;
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%) rotate(45deg); }
      100% { transform: translateX(100%) rotate(45deg); }
    }
    
    /* Fade in animation */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
    
    /* Toast */
    @keyframes toast-in {
      from { transform: translateY(-100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .toast-in { animation: toast-in 0.3s ease-out forwards; }
  </style>
</head>
<body class="bg-animated min-h-screen flex items-center justify-center p-4 overflow-hidden relative">
  
  <!-- Floating particles -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
    <div class="particle" style="left: 20%; animation-delay: 2s;"></div>
    <div class="particle" style="left: 30%; animation-delay: 4s;"></div>
    <div class="particle" style="left: 40%; animation-delay: 1s;"></div>
    <div class="particle" style="left: 50%; animation-delay: 3s;"></div>
    <div class="particle" style="left: 60%; animation-delay: 5s;"></div>
    <div class="particle" style="left: 70%; animation-delay: 2.5s;"></div>
    <div class="particle" style="left: 80%; animation-delay: 1.5s;"></div>
    <div class="particle" style="left: 90%; animation-delay: 3.5s;"></div>
  </div>
  
  <!-- Toast Container -->
  <div id="toastContainer" class="fixed top-4 left-1/2 -translate-x-1/2 z-50"></div>
  
  <!-- Main Card -->
  <div class="w-full max-w-md animate-fade-in-up" style="animation-delay: 0.2s;">
    
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-purple-600 shadow-2xl mb-4">
        <i data-lucide="play-circle" class="w-8 h-8 text-white"></i>
      </div>
      <h1 class="text-3xl font-bold text-white mb-1">EmbyHub</h1>
      <p class="text-white/60 text-sm">媒体服务器管理平台</p>
    </div>
    
    <!-- Login Card -->
    <div class="glass rounded-3xl p-8 shadow-2xl">
      <!-- Tabs -->
      <div class="flex mb-6 p-1 bg-white/10 rounded-xl">
        <button id="tabLogin" onclick="switchTab('login')" class="flex-1 py-2.5 text-sm font-medium rounded-lg transition-all bg-white text-gray-800">
          登录
        </button>
        <button id="tabRegister" onclick="switchTab('register')" class="flex-1 py-2.5 text-sm font-medium rounded-lg transition-all text-white/70 hover:text-white">
          注册
        </button>
      </div>
      
      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-white/80 mb-1.5">用户名</label>
          <div class="relative">
            <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/40"></i>
            <input type="text" id="loginUsername" required
              class="w-full pl-12 pr-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none input-glow transition"
              placeholder="输入用户名">
          </div>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-white/80 mb-1.5">密码</label>
          <div class="relative">
            <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/40"></i>
            <input type="password" id="loginPassword" required
              class="w-full pl-12 pr-12 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none input-glow transition"
              placeholder="输入密码">
            <button type="button" onclick="togglePassword('loginPassword')" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/40 hover:text-white/70">
              <i data-lucide="eye" class="w-5 h-5"></i>
            </button>
          </div>
        </div>
        
        <button type="submit" class="btn-shimmer w-full py-3 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-semibold rounded-xl transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98]">
          <span class="flex items-center justify-center space-x-2">
            <i data-lucide="log-in" class="w-5 h-5"></i>
            <span>登录</span>
          </span>
        </button>
      </form>
      
      <!-- Register Form -->
      <form id="registerForm" onsubmit="handleRegister(event)" class="space-y-4 hidden">
        <div>
          <label class="block text-sm font-medium text-white/80 mb-1.5">用户名</label>
          <div class="relative">
            <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/40"></i>
            <input type="text" id="regUsername" required
              class="w-full pl-12 pr-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none input-glow transition"
              placeholder="输入用户名">
          </div>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-white/80 mb-1.5">密码</label>
          <div class="relative">
            <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/40"></i>
            <input type="password" id="regPassword" required minlength="6"
              class="w-full pl-12 pr-12 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none input-glow transition"
              placeholder="至少 6 位密码">
            <button type="button" onclick="togglePassword('regPassword')" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/40 hover:text-white/70">
              <i data-lucide="eye" class="w-5 h-5"></i>
            </button>
          </div>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-white/80 mb-1.5">会员卡 <span class="text-red-400">*</span></label>
          <div class="relative">
            <i data-lucide="ticket" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/40"></i>
            <input type="text" id="regCode" required
              class="w-full pl-12 pr-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none input-glow transition"
              placeholder="EMBY-XXXXXXXX">
          </div>
          <p class="text-xs text-white/50 mt-1.5">联系管理员获取会员卡</p>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-white/80 mb-1.5">邀请码 <span class="text-white/40">(可选)</span></label>
          <div class="relative">
            <i data-lucide="gift" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/40"></i>
            <input type="text" id="regInviteCode"
              class="w-full pl-12 pr-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none input-glow transition"
              placeholder="INV-XXXXXX（可选）"
              oninput="validateInviteCode(this.value)">
            <div id="inviteCodeStatus" class="absolute right-4 top-1/2 -translate-y-1/2"></div>
          </div>
          <p class="text-xs text-white/50 mt-1.5">使用邀请码注册，邀请者可获得金币奖励</p>
        </div>
        
        <button type="submit" class="btn-shimmer w-full py-3 bg-gradient-to-r from-green-600 to-teal-600 hover:from-green-500 hover:to-teal-500 text-white font-semibold rounded-xl transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98]">
          <span class="flex items-center justify-center space-x-2">
            <i data-lucide="user-plus" class="w-5 h-5"></i>
            <span>注册</span>
          </span>
        </button>
      </form>
      
      <!-- Loading overlay -->
      <div id="loadingOverlay" class="hidden absolute inset-0 bg-black/50 rounded-3xl flex items-center justify-center">
        <div class="flex items-center space-x-3 text-white">
          <svg class="animate-spin w-6 h-6" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span>处理中...</span>
        </div>
      </div>
    </div>
    
    <!-- Footer -->
    <p class="text-center text-white/40 text-xs mt-6">
      Powered by EmbyHub · Open Source Media Management
    </p>
  </div>

  <script>
    const API = '/api';
    
    // Initialize
    lucide.createIcons();
    
    // Check if already logged in
    const token = localStorage.getItem('token');
    if (token) {
      window.location.href = '/dashboard';
    }
    
    // Tab switching
    function switchTab(tab) {
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const tabLogin = document.getElementById('tabLogin');
      const tabRegister = document.getElementById('tabRegister');
      
      if (tab === 'login') {
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
        tabLogin.classList.add('bg-white', 'text-gray-800');
        tabLogin.classList.remove('text-white/70');
        tabRegister.classList.remove('bg-white', 'text-gray-800');
        tabRegister.classList.add('text-white/70');
      } else {
        loginForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
        tabRegister.classList.add('bg-white', 'text-gray-800');
        tabRegister.classList.remove('text-white/70');
        tabLogin.classList.remove('bg-white', 'text-gray-800');
        tabLogin.classList.add('text-white/70');
      }
      
      lucide.createIcons();
    }
    
    // Toggle password visibility
    function togglePassword(inputId) {
      const input = document.getElementById(inputId);
      input.type = input.type === 'password' ? 'text' : 'password';
    }
    
    // Show toast
    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      
      const colors = {
        success: 'bg-green-500',
        error: 'bg-red-500',
        warning: 'bg-yellow-500',
        info: 'bg-blue-500'
      };
      
      toast.className = `toast-in px-4 py-3 ${colors[type]} text-white rounded-xl shadow-lg text-sm font-medium`;
      toast.textContent = message;
      
      container.appendChild(toast);
      
      setTimeout(() => toast.remove(), 3000);
    }
    
    // Show/hide loading
    function showLoading() {
      document.getElementById('loadingOverlay').classList.remove('hidden');
    }
    
    function hideLoading() {
      document.getElementById('loadingOverlay').classList.add('hidden');
    }
    
    // Login handler
    async function handleLogin(e) {
      e.preventDefault();
      
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      
      if (!username || !password) {
        showToast('请填写完整信息', 'warning');
        return;
      }
      
      showLoading();
      
      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await res.json();
        
        if (res.ok && data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          showToast('登录成功', 'success');
          setTimeout(() => {
            window.location.href = '/d';
          }, 500);
        } else {
          showToast(data.error || '登录失败', 'error');
        }
      } catch (e) {
        showToast('网络错误，请重试', 'error');
      }
      
      hideLoading();
    }
    
    // Register handler
    async function handleRegister(e) {
      e.preventDefault();
      
      const username = document.getElementById('regUsername').value.trim();
      const password = document.getElementById('regPassword').value;
      const code = document.getElementById('regCode').value.trim();
      const inviteCode = document.getElementById('regInviteCode').value.trim();
      
      if (!username || !password || !code) {
        showToast('请填写完整信息', 'warning');
        return;
      }
      
      if (password.length < 6) {
        showToast('密码至少 6 位', 'warning');
        return;
      }
      
      showLoading();
      
      try {
        const res = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, code, inviteCode: inviteCode || undefined })
        });
        
        const data = await res.json();
        
        if (res.ok && data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          
          let message = '注册成功';
          if (data.rewardInfo && data.rewardInfo.rewardDays > 0) {
            message += `，邀请人获得 ${data.rewardInfo.rewardDays} 天奖励`;
          }
          showToast(message, 'success');
          
          setTimeout(() => {
            window.location.href = '/d';
          }, 500);
        } else {
          showToast(data.error || '注册失败', 'error');
        }
      } catch (e) {
        showToast('网络错误，请重试', 'error');
      }
      
      hideLoading();
    }
    
    // Validate invite code
    async function validateInviteCode(code) {
      const statusEl = document.getElementById('inviteCodeStatus');
      
      if (!code || code.length < 5) {
        statusEl.innerHTML = '';
        return;
      }
      
      try {
        const res = await fetch(`${API}/validate-invite-code`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        });
        
        const data = await res.json();
        
        if (data.valid) {
          statusEl.innerHTML = '<span class="text-green-400 text-xs">✓ 有效</span>';
        } else {
          statusEl.innerHTML = '<span class="text-red-400 text-xs">✗ 无效</span>';
        }
      } catch (e) {
        statusEl.innerHTML = '';
      }
    }
  </script>
</body>
</html>
