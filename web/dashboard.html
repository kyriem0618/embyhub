<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmbyHub - 我的账号</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen">
  <!-- 导航栏 -->
  <nav class="bg-white dark:bg-gray-800 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center space-x-3">
          <span class="text-3xl">🎬</span>
          <div>
            <h1 class="text-xl font-bold text-gray-800 dark:text-white">EmbyHub</h1>
            <p class="text-xs text-gray-500 dark:text-gray-400">我的账号</p>
          </div>
        </div>
        <div class="flex items-center space-x-4">
          <button id="darkModeToggle" class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700">🌙</button>
          <button onclick="logout()" class="text-red-600 hover:text-red-700 font-medium">退出登录</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- 账号信息 -->
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 mb-6">
      <h2 class="text-xl font-bold text-gray-800 dark:text-white mb-6">📋 账号信息</h2>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="p-4 bg-gray-50 dark:bg-gray-700 rounded-xl">
          <span class="text-gray-600 dark:text-gray-400 text-sm">用户名</span>
          <p id="username" class="font-medium text-gray-800 dark:text-white text-lg">-</p>
        </div>
        
        <div class="p-4 bg-gray-50 dark:bg-gray-700 rounded-xl">
          <span class="text-gray-600 dark:text-gray-400 text-sm">Emby ID</span>
          <p id="embyId" class="font-mono text-sm text-gray-800 dark:text-white">-</p>
        </div>
        
        <div class="p-4 bg-gray-50 dark:bg-gray-700 rounded-xl">
          <span class="text-gray-600 dark:text-gray-400 text-sm">账号状态</span>
          <p id="accountStatus" class="font-medium">-</p>
        </div>
        
        <div class="p-4 bg-gray-50 dark:bg-gray-700 rounded-xl">
          <span class="text-gray-600 dark:text-gray-400 text-sm">到期时间</span>
          <p id="expiresAt" class="font-medium text-gray-800 dark:text-white">-</p>
        </div>
      </div>
    </div>

    <!-- 观影统计 -->
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 mb-6">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-gray-800 dark:text-white">📊 观影统计</h2>
        <button onclick="syncPlayback()" class="text-blue-600 hover:underline text-sm">🔄 同步记录</button>
      </div>
      
      <div class="grid grid-cols-3 gap-4 mb-6">
        <div class="p-4 bg-blue-50 dark:bg-blue-900 rounded-xl text-center">
          <p class="text-3xl font-bold text-blue-600" id="totalPlays">0</p>
          <p class="text-sm text-gray-600 dark:text-gray-400">播放次数</p>
        </div>
        <div class="p-4 bg-purple-50 dark:bg-purple-900 rounded-xl text-center">
          <p class="text-3xl font-bold text-purple-600" id="totalHours">0</p>
          <p class="text-sm text-gray-600 dark:text-gray-400">观看时长 (小时)</p>
        </div>
        <div class="p-4 bg-green-50 dark:bg-green-900 rounded-xl text-center">
          <p class="text-3xl font-bold text-green-600" id="activeDays">0</p>
          <p class="text-sm text-gray-600 dark:text-gray-400">活跃天数</p>
        </div>
      </div>
      
      <div id="playHistory" class="space-y-2">
        <p class="text-gray-500 text-center py-4">点击"同步记录"加载观影历史</p>
      </div>
    </div>

    <!-- 续期 -->
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 mb-6">
      <h2 class="text-xl font-bold text-gray-800 dark:text-white mb-6">⏰ 账号续期</h2>
      
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">续期码</label>
          <input type="text" id="redeemCode" class="w-full px-4 py-3 border dark:border-gray-600 rounded-xl dark:bg-gray-700 dark:text-white" placeholder="EMBY-XXXXXXXX" />
        </div>
        
        <button onclick="redeemCode()" class="w-full bg-gradient-to-r from-green-600 to-teal-600 hover:from-green-700 hover:to-teal-700 text-white font-medium py-3 rounded-xl transition">
          使用续期码
        </button>
        
        <p class="text-xs text-gray-500 dark:text-gray-400 text-center">
          联系管理员获取续期码，每个续期码只能使用一次
        </p>
      </div>
    </div>

    <!-- 修改密码 -->
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6">
      <h2 class="text-xl font-bold text-gray-800 dark:text-white mb-6">🔐 修改密码</h2>
      
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">原密码</label>
          <input type="password" id="oldPassword" class="w-full px-4 py-3 border dark:border-gray-600 rounded-xl dark:bg-gray-700 dark:text-white" />
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">新密码</label>
          <input type="password" id="newPassword" class="w-full px-4 py-3 border dark:border-gray-600 rounded-xl dark:bg-gray-700 dark:text-white" />
        </div>
        
        <button onclick="changePassword()" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-medium py-3 rounded-xl transition">
          修改密码
        </button>
      </div>
    </div>
  </main>

  <!-- 续期日志模态框 -->
  <div id="logsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white dark:bg-gray-800 rounded-xl p-6 w-full max-w-lg mx-4 max-h-[80vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-bold text-gray-800 dark:text-white">续期记录</h3>
        <button onclick="document.getElementById('logsModal').classList.add('hidden')" class="text-gray-500 hover:text-gray-700">✕</button>
      </div>
      <div id="redemptionLogs">
        <p class="text-gray-500 text-center py-4">加载中...</p>
      </div>
    </div>
  </div>

  <script>
    const API = '/api';
    let currentUser = null;

    // 验证登录
    const token = localStorage.getItem('token');
    if (!token) {
      window.location.href = '/';
    }

    // 加载用户信息
    async function loadUserInfo() {
      try {
        const res = await fetch(`${API}/user/me`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        const data = await res.json();
        
        if (res.ok) {
          currentUser = data;
          document.getElementById('username').textContent = data.username;
          document.getElementById('embyId').textContent = data.embyId || '未绑定';
          
          // 账号状态
          const statusEl = document.getElementById('accountStatus');
          if (data.isActive) {
            statusEl.className = 'px-3 py-1 bg-green-100 dark:bg-green-900 text-green-800 dark:text-green-200 rounded-full text-sm';
            statusEl.textContent = '正常';
          } else {
            statusEl.className = 'px-3 py-1 bg-red-100 dark:bg-red-900 text-red-800 dark:text-red-200 rounded-full text-sm';
            statusEl.textContent = '已禁用';
          }
          
          // 到期时间
          const expiresEl = document.getElementById('expiresAt');
          if (data.expiresAt) {
            const expiresDate = new Date(data.expiresAt);
            const now = new Date();
            const daysLeft = Math.floor((expiresDate - now) / (1000 * 60 * 60 * 24));
            
            expiresEl.textContent = expiresDate.toLocaleString('zh-CN');
            
            if (daysLeft < 0) {
              expiresEl.className = 'font-medium text-red-600';
              expiresEl.textContent += ' (已过期)';
            } else if (daysLeft < 7) {
              expiresEl.className = 'font-medium text-orange-600';
              expiresEl.textContent += ` (还剩${daysLeft}天)`;
            } else {
              expiresEl.className = 'font-medium text-green-600';
              expiresEl.textContent += ` (还剩${daysLeft}天)`;
            }
          } else {
            expiresEl.textContent = '永久';
          }
        } else {
          logout();
        }
      } catch (error) {
        console.error('Failed to load user info:', error);
      }
    }

    // 观影记录
    async function syncPlayback() {
      try {
        const res = await fetch(`${API}/user/sync-playback`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        
        if (res.ok) {
          alert(`同步成功，共 ${data.count} 条记录`);
          loadPlayHistory();
        } else {
          alert('同步失败：' + data.error);
        }
      } catch (error) {
        alert('同步失败：' + error.message);
      }
    }

    async function loadPlayHistory() {
      try {
        const res = await fetch(`${API}/user/play-history`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        
        document.getElementById('totalPlays').textContent = data.stats?.totalPlays || 0;
        document.getElementById('totalHours').textContent = Math.round((data.stats?.totalDuration || 0) / 3600);
        document.getElementById('activeDays').textContent = data.stats?.activeDays || 0;
        
        const historyEl = document.getElementById('playHistory');
        if (!data.history || data.history.length === 0) {
          historyEl.innerHTML = '<p class="text-gray-500 text-center py-4">暂无观影记录，点击"同步记录"加载</p>';
          return;
        }
        
        historyEl.innerHTML = data.history.slice(0, 10).map(item => `
          <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-700 rounded-lg">
            <div class="flex items-center space-x-3">
              <span class="text-2xl">${item.item_type === 'Movie' ? '🎬' : item.item_type === 'Series' ? '📺' : '📽️'}</span>
              <div>
                <p class="font-medium text-gray-800 dark:text-white">${item.item_name}</p>
                <p class="text-xs text-gray-500">${new Date(item.played_at).toLocaleString('zh-CN')}</p>
              </div>
            </div>
            <span class="text-sm text-gray-500">${Math.round(item.play_duration / 60)}分钟</span>
          </div>
        `).join('');
      } catch (error) {
        console.error('加载观影记录失败:', error);
      }
    }

    async function loadRedemptionLogs() {
      try {
        const res = await fetch(`${API}/user/redemption-logs`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const logs = await res.json();
        
        const logsEl = document.getElementById('redemptionLogs');
        if (!logs || logs.length === 0) {
          logsEl.innerHTML = '<p class="text-gray-500 text-center py-4">暂无续期记录</p>';
          return;
        }
        
        logsEl.innerHTML = logs.map(log => `
          <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-700 rounded-lg mb-2">
            <div>
              <p class="font-medium text-gray-800 dark:text-white">使用续期码 +${log.days_added}天</p>
              <p class="text-xs text-gray-500">${new Date(log.created_at).toLocaleString('zh-CN')}</p>
            </div>
            <span class="text-green-600 font-medium">+${log.days_added}天</span>
          </div>
        `).join('');
      } catch (error) {
        console.error('加载续期日志失败:', error);
      }
    }

    // 续期
    async function redeemCode() {
      const code = document.getElementById('redeemCode').value.trim();
      if (!code) return alert('请输入续期码');
      
      try {
        const res = await fetch(`${API}/user/redeem`, {
          method: 'POST',
          headers: { 
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ code })
        });
        
        const data = await res.json();
        
        if (res.ok && data.success) {
          alert('续期成功！');
          document.getElementById('redeemCode').value = '';
          loadUserInfo();
        } else {
          alert('续期失败：' + data.error);
        }
      } catch (error) {
        alert('续期失败：' + error.message);
      }
    }

    // 修改密码
    async function changePassword() {
      const oldPassword = document.getElementById('oldPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      
      if (!oldPassword || !newPassword) return alert('请填写完整');
      if (newPassword.length < 6) return alert('密码至少 6 位');
      
      if (!confirm('确定要修改密码吗？')) return;
      
      try {
        const res = await fetch(`${API}/user/change-password`, {
          method: 'POST',
          headers: { 
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ oldPassword, newPassword })
        });
        
        const data = await res.json();
        
        if (res.ok && data.success) {
          alert('密码修改成功！请重新登录');
          logout();
        } else {
          alert('修改失败：' + data.error);
        }
      } catch (error) {
        alert('修改失败：' + error.message);
      }
    }

    // 退出登录
    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/';
    }

    // 深色模式
    document.getElementById('darkModeToggle').addEventListener('click', () => {
      document.body.classList.toggle('dark');
      localStorage.setItem('darkMode', document.body.classList.contains('dark'));
    });

    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark');
    }

    loadUserInfo();
    loadPlayHistory();
    loadRedemptionLogs();
  </script>
</body>
</html>
