<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmbyHub - Emby 用户管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .dark { --bg: #1a1a2e; --card: #16213e; --text: #eee; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen">
  <!-- 导航栏 -->
  <nav class="bg-white dark:bg-gray-800 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <span class="text-2xl">🎬</span>
          <h1 class="ml-3 text-xl font-bold text-gray-800 dark:text-white">EmbyHub</h1>
        </div>
        <div class="flex items-center space-x-4">
          <button id="darkModeToggle" class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700">
            🌙
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- 状态卡片 -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
        <h3 class="text-gray-500 dark:text-gray-400 text-sm">Emby 服务器</h3>
        <p id="serverStatus" class="text-2xl font-bold mt-2">检测中...</p>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
        <h3 class="text-gray-500 dark:text-gray-400 text-sm">用户总数</h3>
        <p id="userCount" class="text-2xl font-bold mt-2">-</p>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
        <h3 class="text-gray-500 dark:text-gray-400 text-sm">活跃会话</h3>
        <p id="sessionCount" class="text-2xl font-bold mt-2">-</p>
      </div>
    </div>

    <!-- 用户管理 -->
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow mb-8">
      <div class="p-6 border-b dark:border-gray-700">
        <div class="flex justify-between items-center">
          <h2 class="text-xl font-bold text-gray-800 dark:text-white">用户管理</h2>
          <button onclick="showCreateUserModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">
            + 新建用户
          </button>
        </div>
      </div>
      <div class="p-6">
        <div id="userList" class="space-y-4">
          <!-- 用户列表将通过 JS 动态加载 -->
          <p class="text-gray-500 text-center py-8">加载中...</p>
        </div>
      </div>
    </div>

    <!-- 活跃会话 -->
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow">
      <div class="p-6 border-b dark:border-gray-700">
        <h2 class="text-xl font-bold text-gray-800 dark:text-white">活跃会话</h2>
      </div>
      <div class="p-6">
        <div id="sessionList" class="space-y-4">
          <!-- 会话列表将通过 JS 动态加载 -->
          <p class="text-gray-500 text-center py-8">加载中...</p>
        </div>
      </div>
    </div>
  </main>

  <!-- 创建用户模态框 -->
  <div id="createUserModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
    <div class="bg-white dark:bg-gray-800 rounded-lg p-6 w-full max-w-md">
      <h3 class="text-xl font-bold mb-4 text-gray-800 dark:text-white">创建新用户</h3>
      <input 
        type="text" 
        id="newUserName" 
        placeholder="用户名" 
        class="w-full px-4 py-2 border rounded-lg mb-4 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
      />
      <div class="flex justify-end space-x-3">
        <button onclick="hideCreateUserModal()" class="px-4 py-2 text-gray-600 dark:text-gray-300">取消</button>
        <button onclick="createUser()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">创建</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';

    // 深色模式切换
    document.getElementById('darkModeToggle').addEventListener('click', () => {
      document.body.classList.toggle('dark');
    });

    // 加载数据
    async function loadData() {
      await loadServerStatus();
      await loadUsers();
      await loadSessions();
    }

    async function loadServerStatus() {
      try {
        const res = await fetch(`${API_BASE}/emby/test`);
        const data = await res.json();
        document.getElementById('serverStatus').innerHTML = data.success 
          ? `<span class="text-green-600">✓ ${data.serverName || 'Connected'}</span>`
          : `<span class="text-red-600">✗ ${data.error}</span>`;
      } catch (e) {
        document.getElementById('serverStatus').innerHTML = '<span class="text-red-600">✗ 连接失败</span>';
      }
    }

    async function loadUsers() {
      try {
        const res = await fetch(`${API_BASE}/users`);
        const users = await res.json();
        document.getElementById('userCount').textContent = users.length;
        
        const list = document.getElementById('userList');
        if (users.length === 0) {
          list.innerHTML = '<p class="text-gray-500 text-center py-8">暂无用户</p>';
          return;
        }
        
        list.innerHTML = users.map(user => `
          <div class="flex items-center justify-between p-4 bg-gray-50 dark:bg-gray-700 rounded-lg">
            <div class="flex items-center space-x-3">
              <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold">
                ${user.Name.charAt(0).toUpperCase()}
              </div>
              <div>
                <p class="font-medium text-gray-800 dark:text-white">${user.Name}</p>
                <p class="text-sm text-gray-500 dark:text-gray-400">ID: ${user.Id}</p>
              </div>
            </div>
            <div class="space-x-2">
              <button onclick="resetPassword('${user.Id}')" class="px-3 py-1 text-sm bg-yellow-600 hover:bg-yellow-700 text-white rounded">重置密码</button>
              <button onclick="deleteUser('${user.Id}')" class="px-3 py-1 text-sm bg-red-600 hover:bg-red-700 text-white rounded">删除</button>
            </div>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('userList').innerHTML = '<p class="text-red-600 text-center">加载失败</p>';
      }
    }

    async function loadSessions() {
      try {
        const res = await fetch(`${API_BASE}/sessions`);
        const sessions = await res.json();
        document.getElementById('sessionCount').textContent = sessions.length;
        
        const list = document.getElementById('sessionList');
        if (sessions.length === 0) {
          list.innerHTML = '<p class="text-gray-500 text-center py-8">暂无活跃会话</p>';
          return;
        }
        
        list.innerHTML = sessions.map(session => `
          <div class="flex items-center justify-between p-4 bg-gray-50 dark:bg-gray-700 rounded-lg">
            <div>
              <p class="font-medium text-gray-800 dark:text-white">${session.UserName || '未知用户'}</p>
              <p class="text-sm text-gray-500 dark:text-gray-400">${session.DeviceName || '未知设备'}</p>
            </div>
            <button onclick="stopSession('${session.Id}')" class="px-3 py-1 text-sm bg-red-600 hover:bg-red-700 text-white rounded">停止</button>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('sessionList').innerHTML = '<p class="text-red-600 text-center">加载失败</p>';
      }
    }

    // 用户操作
    function showCreateUserModal() {
      document.getElementById('createUserModal').classList.remove('hidden');
    }

    function hideCreateUserModal() {
      document.getElementById('createUserModal').classList.add('hidden');
      document.getElementById('newUserName').value = '';
    }

    async function createUser() {
      const name = document.getElementById('newUserName').value.trim();
      if (!name) return alert('请输入用户名');
      
      try {
        const res = await fetch(`${API_BASE}/users`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });
        
        if (res.ok) {
          hideCreateUserModal();
          loadUsers();
        } else {
          const data = await res.json();
          alert('创建失败：' + data.error);
        }
      } catch (e) {
        alert('创建失败：' + e.message);
      }
    }

    async function deleteUser(id) {
      if (!confirm('确定要删除此用户吗？此操作不可恢复！')) return;
      
      try {
        const res = await fetch(`${API_BASE}/users/${id}`, { method: 'DELETE' });
        if (res.ok) loadUsers();
        else alert('删除失败');
      } catch (e) {
        alert('删除失败：' + e.message);
      }
    }

    async function resetPassword(id) {
      const newPassword = prompt('请输入新密码：');
      if (!newPassword) return;
      
      try {
        const res = await fetch(`${API_BASE}/users/${id}/password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ newPassword })
        });
        
        if (res.ok) alert('密码已重置');
        else alert('重置失败');
      } catch (e) {
        alert('重置失败：' + e.message);
      }
    }

    async function stopSession(id) {
      if (!confirm('停止此会话？')) return;
      
      try {
        const res = await fetch(`${API_BASE}/sessions/${id}/stop`, { method: 'POST' });
        if (res.ok) loadSessions();
        else alert('停止失败');
      } catch (e) {
        alert('停止失败：' + e.message);
      }
    }

    // 初始化
    loadData();
    // 每 30 秒刷新数据
    setInterval(loadData, 30000);
  </script>
</body>
</html>
