<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmbyHub - 注册</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-900 via-purple-900 to-pink-900 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8 w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="text-6xl mb-4">🎬</div>
      <h1 class="text-3xl font-bold text-gray-800 dark:text-white">注册账号</h1>
      <p class="text-gray-500 dark:text-gray-400 mt-2">使用续期码创建 Emby 账号</p>
    </div>

    <!-- 注册表单 -->
    <form id="registerForm" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">用户名</label>
        <input type="text" id="username" required class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-green-500 dark:bg-gray-700 dark:text-white" placeholder="请输入用户名" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">密码</label>
        <input type="password" id="password" required minlength="6" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-green-500 dark:bg-gray-700 dark:text-white" placeholder="至少 6 位密码" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">续期码</label>
        <input type="text" id="code" required class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-green-500 dark:bg-gray-700 dark:text-white" placeholder="EMBY-XXXXXXXX" />
        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">联系管理员获取续期码</p>
      </div>

      <button type="submit" class="w-full bg-gradient-to-r from-green-600 to-teal-600 hover:from-green-700 hover:to-teal-700 text-white font-medium py-3 rounded-xl transition transform hover:scale-105">
        注册
      </button>
    </form>

    <!-- 返回登录 -->
    <div class="mt-6 text-center">
      <a href="/" class="text-gray-600 dark:text-gray-400 hover:text-blue-600 font-medium">← 返回登录</a>
    </div>

    <!-- 错误/成功提示 -->
    <div id="msgDiv" class="hidden mt-4 p-4 rounded-xl text-sm"></div>
  </div>

  <script>
    const API = '/api';

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const code = document.getElementById('code').value.trim();
      const msgDiv = document.getElementById('msgDiv');
      
      try {
        const res = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, code })
        });
        
        const data = await res.json();
        
        if (res.ok && data.success) {
          msgDiv.className = 'mt-4 p-4 bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-200 rounded-xl text-sm';
          msgDiv.textContent = '注册成功！即将跳转到登录页面...';
          msgDiv.classList.remove('hidden');
          
          setTimeout(() => {
            window.location.href = '/';
          }, 2000);
        } else {
          msgDiv.className = 'mt-4 p-4 bg-red-100 dark:bg-red-900 text-red-700 dark:text-red-200 rounded-xl text-sm';
          msgDiv.textContent = data.error || '注册失败';
          msgDiv.classList.remove('hidden');
        }
      } catch (error) {
        msgDiv.className = 'mt-4 p-4 bg-red-100 dark:bg-red-900 text-red-700 dark:text-red-200 rounded-xl text-sm';
        msgDiv.textContent = '网络错误，请稍后重试';
        msgDiv.classList.remove('hidden');
      }
    });

    if (localStorage.getItem('darkMode') === 'true' || (!('darkMode' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.body.classList.add('dark');
    }
  </script>
</body>
</html>
